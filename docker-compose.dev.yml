services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gptc
      POSTGRES_PASSWORD: gptc
      POSTGRES_DB: gptc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gptc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
